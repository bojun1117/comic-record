name: Deploy frontend to GitHub Pages

# 觸發:push 到 main 分支
# 也可以手動觸發(workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一個 branch 同時只跑一個部署,後面的會等前面跑完
concurrency:
  group: 'pages'
  cancel-in-progress: false

# 給 GITHUB_TOKEN 發布到 GitHub Pages 的權限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: comic-vibe/package-lock.json

      - name: Install dependencies
        working-directory: comic-vibe
        run: npm ci

      - name: Type check
        working-directory: comic-vibe
        run: npm run type-check

      - name: Build
        working-directory: comic-vibe
        env:
          # base 需與 GitHub Pages 子路徑一致
          VITE_BASE_PATH: /comic-record/
          # API base URL 用 .env.production 裡的值,這裡不覆蓋
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: comic-vibe/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
