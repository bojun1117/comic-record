# 非機密設定。
# CORS allowlist:K8s 存取走 ingress 上的 host(comic-vibe.localtest.me),
# 同時允許前端 dev server (localhost:5173) 直接打 cluster。
apiVersion: v1
kind: ConfigMap
metadata:
  name: comic-vibe-config
  namespace: comic-vibe
data:
  PORT: "8080"
  ALLOWED_ORIGINS: "http://localhost:5173,http://comic-vibe.localtest.me"
  TABLE_NAME: "comic-vibe-mangas-dev"
  AWS_REGION: "us-east-1"
  BEDROCK_MODEL_ID: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
