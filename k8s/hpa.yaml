# Horizontal Pod Autoscaler
# CPU 使用率 > 70%(相對 requests=50m,即 35m 平均)就擴 replica。
# 平靜後 5 分鐘(K8s 預設 stabilization window)會 scale-down 回 minReplicas。
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: comic-vibe-server
  namespace: comic-vibe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: comic-vibe-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
