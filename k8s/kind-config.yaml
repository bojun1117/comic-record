# kind cluster 設定。
# - 把 host (Mac) 的 80/443 port 對應到 cluster node,讓 nginx-ingress 直接吃 host 流量
# - control-plane 加 ingress-ready=true label,nginx-ingress 會 schedule 在這個節點上
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: comic-vibe
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
