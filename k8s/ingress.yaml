# comic-vibe.localtest.me 是公開 DNS,所有子網域都解析到 127.0.0.1,
# 配合 kind 把 host 80/443 對應到 cluster,不用改 /etc/hosts。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: comic-vibe-server
  namespace: comic-vibe
spec:
  ingressClassName: nginx
  rules:
    - host: comic-vibe.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: comic-vibe-server
                port:
                  number: 80
